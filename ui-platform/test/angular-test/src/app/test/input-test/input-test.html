<h2>Angular v21 Advanced Stress Test</h2>

<button (click)="updateAllPlaceholders()">Update All Placeholders</button>

<button (click)="fillAll()">Fill All Values</button>

<div style="height: 500px; overflow: auto">
  @for (item of inputs(); track $index) {
    <div>
      <!-- <ui-input-angular
        [ngModel]="item.value"
        (ngModelChange)="updateValue($index, $event)"
        [placeholder]="item.placeholder"
        [disabled]="item.disabled"
      ></ui-input-angular> -->
      <ui-input-angular [placeholder]="item.placeholder"></ui-input-angular>

      <button (click)="toggleOne($index)">Toggle #{{ $index }}</button>
    </div>
  }
</div>

<h1>toaster here</h1>
<ui-toast-angular></ui-toast-angular>
<button
  [toastTrigger]="{
    message: 'Hello Directive 🚀',
    type: 'success',
    position: 'top-right',
  }"
>
  Show via Directive
</button>

<br /><br />

<!-- Service usage -->
<button (click)="manual()">Manual Toast</button>
