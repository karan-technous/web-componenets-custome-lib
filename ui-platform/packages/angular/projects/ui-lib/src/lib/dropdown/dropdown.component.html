<ui-dropdown
  [value]="value()"
  [options]="options()"
  [mode]="mode()"
  [variant]="variant()"
  [placeholder]="placeholder()"
  [label]="label()"
  [disabled]="isDisabled()"
  [loading]="loading()"
  [searchable]="searchable()"
  [clearable]="clearable()"
  [open]="open()"
  [selectAll]="selectAll()"
  [minWidth]="minWidth()"
  [maxWidth]="maxWidth()"
  [maxHeight]="maxHeight()"
  (valueChange)="handleValueChange($event)"
  (openChange)="handleOpenChange($event)"
  (search)="handleSearch($event)"
></ui-dropdown>
