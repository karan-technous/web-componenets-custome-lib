<ui-input
  [value]="value()"
  [placeholder]="placeholder()"
  [label]="label()"
  [disabled]="isDisabled()"
  [type]="type()"
  [rounded]="rounded()"
  [icon]="icon()"
  [iconAriaLabel]="iconAriaLabel()"
  (valueChange)="handleInput($event)"
  (uiBlur)="handleBlur()"
  (uiIconClick)="handleIconClick()"
></ui-input>
