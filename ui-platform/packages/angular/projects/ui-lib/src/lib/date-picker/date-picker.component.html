<ui-date-picker
  [value]="value()"
  [mode]="mode()"
  [placeholder]="placeholder()"
  [disabled]="disabled() || disabledState()"
  [loading]="loading()"
  [readonly]="readonly()"
  [open]="open()"
  [defaultOpen]="defaultOpen()"
  [minDate]="minDate()"
  [maxDate]="maxDate()"
  [showIcon]="showIcon()"
  [iconOnly]="iconOnly()"
  [icon]="icon()"
  [showActions]="showActions()"
  [search]="search()"
  [customParsers]="customParsers()"
  [debounce]="debounce()"
  (onChange)="handleChange($event)"
  (onInputChange)="handleInputChange($event)"
  (onApply)="handleApply($event)"
  (onCancel)="handleCancel()"
  (onOpenChange)="handleOpenChange($event)"
  (onInvalidInput)="handleInvalidInput($event)"
  (onFocus)="handleFocus()"
  (onBlur)="handleBlur()"
></ui-date-picker>
