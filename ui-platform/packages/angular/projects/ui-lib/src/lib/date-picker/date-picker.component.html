<ui-date-picker
  [value]="value()"
  [mode]="mode()"
  [placeholder]="placeholder()"
  [disabled]="disabled() || disabledState()"
  [loading]="loading()"
  [readonly]="readonly()"
  [open]="open()"
  [defaultOpen]="defaultOpen()"
  [minDate]="minDate()"
  [maxDate]="maxDate()"
  [minYear]="minYear()"
  [maxYear]="maxYear()"
  [showIcon]="showIcon()"
  [iconOnly]="iconOnly()"
  [icon]="icon()"
  [label]="label()"
  [showActions]="showActions()"
  [search]="search()"
  [customParsers]="customParsers()"
  [debounce]="debounce()"
  (uiChange)="handleChange($event)"
  (uiInputChange)="handleInputChange($event)"
  (uiApply)="handleApply($event)"
  (uiCancel)="handleCancel()"
  (uiOpenChange)="handleOpenChange($event)"
  (uiInvalidInput)="handleInvalidInput($event)"
  (uiFocus)="handleFocus()"
  (uiBlur)="handleBlur()"
></ui-date-picker>
