<ui-button
  [variant]="variant()"
  [size]="size()"
  [disabled]="disabled()"
  [loading]="loading()"
  [fullWidth]="fullWidth()"
  [animated]="animated()"
  [rounded]="rounded()"
  [iconLeft]="iconLeft()"
  [iconRight]="iconRight()"
  [icon]="icon()"
  (uiClick)="uiClick.emit($event.detail)"
  (uiFocus)="uiFocus.emit()"
  (uiBlur)="uiBlur.emit()"
>
  <!-- Left icon slot -->
  <ng-content select="[icon-left]" slot="icon-left"></ng-content>

  <!-- Default content slot -->
  <ng-content></ng-content>

  <!-- Right icon slot -->
  <ng-content select="[icon-right]" slot="icon-right"></ng-content>
</ui-button>
